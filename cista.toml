# Norma as a cista source package (Phase B).
#
# Install maps `interfaces = "src"` into the store as
# `$CISTAE_HOME/norma/<version>/interfaces/`. Version is independent of the
# faber crate. Apps do not list norma in faber.toml — platform default.

[source]
package = "norma"
version = "0.1.0"
faber_min = "0.38.0"
kind = "source"
interfaces = "src"

[target]
language = "rust"
mode = "compile"
binding_policy = "generated"
crate = "norma"
